<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Design BodyGraph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Discover Your Design</h1>
            <p>Enter your birth details to generate your BodyGraph chart.</p>
        </header>

        <main>
            <form id="birthForm" class="clean-card">
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Birth Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Birth Time</label>
                        <input type="time" id="time" name="time" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="zipcode">US Zip Code (for timezone)</label>
                    <input type="text" id="zipcode" name="zipcode" placeholder="e.g. 90210" pattern="[0-9]{5}" required>
                    <small class="helper-text">Used securely to determine your exact UTC birth time.</small>
                </div>
                
                <button type="submit" class="btn-primary" id="submitBtn">
                    <span class="btn-text">Generate Chart</span>
                    <div class="loader hidden"></div>
                </button>
            </form>

            <div id="errorContainer" class="error-message hidden"></div>

            <div id="resultsContainer" class="results-container hidden">
                <div class="clean-card center-text">
                    <h2 class="section-title">Your Human Design</h2>
                    <h3 id="typeProfile" class="main-title"></h3>
                    <p id="crossDetails" class="subtitle"></p>
                </div>

                <div class="grid-layout">
                    <div class="clean-card">
                        <h4>Key Attributes</h4>
                        <ul class="attribute-list">
                            <li><span>Authority</span> <strong id="authVal"></strong></li>
                            <li><span>Strategy</span> <strong id="stratVal"></strong></li>
                            <li><span>Signature</span> <strong id="sigVal"></strong></li>
                            <li><span>Not-Self Theme</span> <strong id="notSelfVal"></strong></li>
                            <li><span>Definition</span> <strong id="defVal"></strong></li>
                        </ul>
                    </div>

                    <div class="clean-card">
                        <h4>Defined Centers</h4>
                        <div id="centersList" class="pill-container"></div>
                    </div>

                    <div class="clean-card full-width">
                        <div class="two-col">
                            <div>
                                <h4>Defined Channels</h4>
                                <ul id="channelsList" class="clean-list"></ul>
                            </div>
                            <div>
                                <h4>Variables</h4>
                                <ul id="variablesList" class="clean-list"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
